{% extends 'products/layout.html' %}

{% block title %}
Inscription
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow-lg p-4">

            <h2 class="text-center mb-4">
                Créer un compte
            </h2>

            <form method="post">

                {% csrf_token %}

                {{ form.as_p }}

                <div class="d-grid">

                    <button class="btn btn-success">
                        S'inscrire
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
